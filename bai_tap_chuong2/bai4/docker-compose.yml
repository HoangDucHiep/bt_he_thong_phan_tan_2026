version: "3.8"

services:

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    healthcheck:
      # wget is available in alpine busybox; check the /users endpoint
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/users"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
    networks:
      - microservices-net
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/orders"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
    networks:
      - microservices-net
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

networks:
  microservices-net:
    driver: bridge
